<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[P04] Tailwind — Create an alert message for success notifications. Include a</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, sans-serif; background: #fff; margin: 0; padding: 2rem; }
  .meta { max-width: 800px; margin: 0 auto 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0; }
  .meta h1 { font-size: 1rem; margin: 0 0 0.25rem; }
  .meta p { color: #64748b; font-size: 0.8rem; margin: 0; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 9999px; background: #d1fae5; color: #065f46; font-weight: 600; margin-left: 0.5rem; }
  .output { max-width: 800px; margin: 0 auto; }
</style>
</head>
<body>
<div class="meta"><h1>P04: Create an alert message for success notifications. <span class="badge">Tailwind</span></h1><p>735 tokens · Tailwind CDN</p></div>
<div class="output"><div id="success-alert" class="flex items-center justify-between p-4 mb-4 bg-green-50 border border-green-200 rounded-lg" role="alert">
  <div class="flex items-center gap-3">
    <!-- Success icon -->
    <svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    
    <div>
      <p class="text-sm font-medium text-green-800">
        Success! Your changes have been saved.
      </p>
    </div>
  </div>
  
  <!-- Dismiss button -->
  <button 
    type="button" 
    class="inline-flex items-center justify-center w-6 h-6 text-green-500 hover:text-green-700 hover:bg-green-100 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-offset-2 focus:ring-offset-green-50 transition-colors"
    onclick="this.closest('[role=alert]').remove()"
    aria-label="Dismiss"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
</div>
</div>
</body>
</html>
