<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, sans-serif; background: #fff; margin: 0; padding: 2rem; }
  .meta { max-width: 800px; margin: 0 auto 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0; }
  .meta h1 { font-size: 1rem; margin: 0 0 0.25rem; }
  .meta p { color: #64748b; font-size: 0.8rem; margin: 0; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 9999px; background: #d1fae5; color: #065f46; font-weight: 600; margin-left: 0.5rem; }

</style>

<body>
<div class="meta"><h1>P07: Build a data table with Name, Title, and Status co <span class="badge">Tailwind</span></h1><p>524 tokens · Tailwind CDN</p></div>
<div class="output"><div class="overflow-x-auto">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Name
        </th>
        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Title
        </th>
        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Status
        </th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr class="hover:bg-gray-50">
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
          Jane Cooper
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
          Regional Paradigm Technician
        </td>
        <td class="px-6 py-4 whitespace-nowrap">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
            Active
          </span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</div>
