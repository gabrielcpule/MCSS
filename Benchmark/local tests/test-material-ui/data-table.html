<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material-UI Benchmark: Complex Data Table</title>
    <!-- React -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Material-UI -->
    <script src="https://unpkg.com/@mui/material@5/umd/material-ui.development.js"></script>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const {
            Box, Paper, Table, TableBody, TableCell, TableContainer, TableHead, TablePagination,
            TableRow, TableSortLabel, TextField, Button, createTheme, ThemeProvider
        } = MaterialUI;

        const { useMemo, useState } = React;

        function ComplexDataTable() {
            const allUsers = useMemo(() => [
                { id: 1, name: 'Zoe Smith', email: 'zoe@example.com', role: 'Admin' }, { id: 2, name: 'Adam Johnson', email: 'adam@example.com', role: 'Editor' },
                { id: 3, name: 'Jane Doe', email: 'jane@example.com', role: 'Viewer' }, { id: 4, name: 'Peter Jones', email: 'peter@example.com', role: 'Editor' },
                { id: 5, name: 'Mary Williams', email: 'mary@example.com', role: 'Admin' }, { id: 6, name: 'Chris Brown', email: 'chris@example.com', role: 'Viewer' },
            ], []);

            const [filter, setFilter] = useState('');
            const [order, setOrder] = useState('asc');
            const [orderBy, setOrderBy] = useState('name');
            const [page, setPage] = useState(0);
            const [rowsPerPage, setRowsPerPage] = useState(3);

            const handleSortRequest = (property) => {
                const isAsc = orderBy === property && order === 'asc';
                setOrder(isAsc ? 'desc' : 'asc');
                setOrderBy(property);
            };

            const filteredUsers = useMemo(() => {
                return allUsers.filter(user =>
                    user.name.toLowerCase().includes(filter.toLowerCase()) ||
                    user.email.toLowerCase().includes(filter.toLowerCase())
                );
            }, [allUsers, filter]);

            const sortedUsers = useMemo(() => {
                const comparator = (a, b) => {
                    if (b[orderBy] < a[orderBy]) return order === 'asc' ? 1 : -1;
                    if (b[orderBy] > a[orderBy]) return order === 'asc' ? -1 : 1;
                    return 0;
                };
                return [...filteredUsers].sort(comparator);
            }, [filteredUsers, order, orderBy]);

            const paginatedUsers = useMemo(() => {
                return sortedUsers.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);
            }, [sortedUsers, page, rowsPerPage]);

            return (
                <Paper sx={{ width: '100%', mb: 2 }}>
                    <Box sx={{ p: 2 }}>
                        <TextField
                            label="Filter Users" variant="outlined" size="small" fullWidth
                            value={filter} onChange={(e) => setFilter(e.target.value)}
                        />
                    </Box>
                    <TableContainer>
                        <Table>
                            <TableHead>
                                <TableRow>
                                    <TableCell sortDirection={orderBy === 'name' ? order : false}>
                                        <TableSortLabel active={orderBy === 'name'} direction={orderBy === 'name' ? order : 'asc'} onClick={() => handleSortRequest('name')}>
                                            Name
                                        </TableSortLabel>
                                    </TableCell>
                                    <TableCell sortDirection={orderBy === 'email' ? order : false}>
                                        <TableSortLabel active={orderBy === 'email'} direction={orderBy === 'email' ? order : 'asc'} onClick={() => handleSortRequest('email')}>
                                            Email
                                        </TableSortLabel>
                                    </TableCell>
                                    <TableCell>Role</TableCell>
                                    <TableCell>Actions</TableCell>
                                </TableRow>
                            </TableHead>
                            <TableBody>
                                {paginatedUsers.map((user) => (
                                    <TableRow hover key={user.id}>
                                        <TableCell>{user.name}</TableCell>
                                        <TableCell>{user.email}</TableCell>
                                        <TableCell>{user.role}</TableCell>
                                        <TableCell>
                                            <Button size="small">Edit</Button>
                                            <Button size="small" color="error">Delete</Button>
                                        </TableCell>
                                    </TableRow>
                                ))}
                            </TableBody>
                        </Table>
                    </TableContainer>
                    <TablePagination
                        rowsPerPageOptions={[3, 5, 10]} component="div" count={filteredUsers.length}
                        rowsPerPage={rowsPerPage} page={page}
                        onPageChange={(e, newPage) => setPage(newPage)}
                        onRowsPerPageChange={(e) => {
                            setRowsPerPage(parseInt(e.target.value, 10));
                            setPage(0);
                        }}
                    />
                </Paper>
            );
        }

        const theme = createTheme();

        ReactDOM.render(
            <ThemeProvider theme={theme}>
                <Box sx={{ p: 4 }}>
                    <h1>Material-UI Benchmark: Complex Data Table</h1>
                    <p>A responsive table with sorting, filtering, and pagination using Material-UI components.</p>
                    <ComplexDataTable />
                </Box>
            </ThemeProvider>,
            document.getElementById('root'),
        );
    </script>
</body>
</html>
