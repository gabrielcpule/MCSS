<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Benchmark: Complex Data Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="container mx-auto">
        <section id="test-6-1" class="mb-12">
            <h1 class="text-3xl font-bold mb-4 text-gray-900">Tailwind CSS Benchmark: Complex Data Table</h1>
            <p class="text-gray-600 mb-4">A fully dynamic data table built with Tailwind utilities and Alpine.js.</p>
            <div class="p-6 border rounded-lg bg-white" x-data="dataTable()">
                <!-- Controls -->
                <div class="flex justify-between items-center mb-4">
                    <input type="search" x-model.debounce.300ms="filter" placeholder="Filter users..."
                        class="w-full md:w-1/3 px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <!-- Table -->
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white">
                        <caption class="text-lg font-semibold text-left p-2">User Management</caption>
                        <thead class="bg-gray-800 text-white">
                            <tr>
                                <th @click="sortBy('name')"
                                    class="w-1/3 text-left py-3 px-4 uppercase font-semibold text-sm cursor-pointer">Name
                                    <span x-show="sortKey === 'name'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
                                </th>
                                <th @click="sortBy('email')"
                                    class="w-1/3 text-left py-3 px-4 uppercase font-semibold text-sm cursor-pointer">Email
                                    <span x-show="sortKey === 'email'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
                                </th>
                                <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Role</th>
                                <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="text-gray-700">
                            <template x-for="user in paginatedUsers" :key="user.id">
                                <tr class="hover:bg-gray-100 border-b border-gray-200">
                                    <td class="w-1/3 text-left py-3 px-4" x-text="user.name"></td>
                                    <td class="w-1/3 text-left py-3 px-4" x-text="user.email"></td>
                                    <td class="text-left py-3 px-4" x-text="user.role"></td>
                                    <td class="text-left py-3 px-4">
                                        <button class="px-3 py-1 bg-blue-500 text-white rounded-md text-sm hover:bg-blue-600">Edit</button>
                                        <button class="px-3 py-1 bg-red-500 text-white rounded-md text-sm hover:bg-red-600">Delete</button>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="paginatedUsers.length === 0">
                                <td colspan="4" class="text-center py-4">No users found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="flex justify-between items-center mt-4">
                    <div>
                        <p class="text-sm text-gray-700">
                            Showing <span x-text="pageStart"></span> to <span x-text="pageEnd"></span> of <span x-text="filteredUsers.length"></span> results
                        </p>
                    </div>
                    <div>
                        <button @click="prevPage" :disabled="currentPage === 1" class="px-3 py-1 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50">Previous</button>
                        <button @click="nextPage" :disabled="currentPage === totalPages" class="ml-2 px-3 py-1 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50">Next</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function dataTable() {
            return {
                allUsers: [
                    { id: 1, name: 'Zoe Smith', email: 'zoe@example.com', role: 'Admin' }, { id: 2, name: 'Adam Johnson', email: 'adam@example.com', role: 'Editor' },
                    { id: 3, name: 'Jane Doe', email: 'jane@example.com', role: 'Viewer' }, { id: 4, name: 'Peter Jones', email: 'peter@example.com', role: 'Editor' },
                    { id: 5, name: 'Mary Williams', email: 'mary@example.com', role: 'Admin' }, { id: 6, name: 'Chris Brown', email: 'chris@example.com', role: 'Viewer' },
                ],
                filter: '', sortKey: 'name', sortDir: 'asc', currentPage: 1, itemsPerPage: 3,
                get filteredUsers() {
                    if (!this.filter) return this.allUsers;
                    return this.allUsers.filter(user => user.name.toLowerCase().includes(this.filter.toLowerCase()) || user.email.toLowerCase().includes(this.filter.toLowerCase()));
                },
                get sortedUsers() {
                    return [...this.filteredUsers].sort((a, b) => {
                        const valA = a[this.sortKey].toLowerCase(); const valB = b[this.sortKey].toLowerCase();
                        if (valA < valB) return this.sortDir === 'asc' ? -1 : 1;
                        if (valA > valB) return this.sortDir === 'asc' ? 1 : -1;
                        return 0;
                    });
                },
                get paginatedUsers() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.sortedUsers.slice(start, start + this.itemsPerPage);
                },
                get totalPages() { return Math.ceil(this.filteredUsers.length / this.itemsPerPage) },
                get pageStart() { return this.filteredUsers.length > 0 ? (this.currentPage - 1) * this.itemsPerPage + 1 : 0 },
                get pageEnd() { return Math.min(this.pageStart + this.itemsPerPage - 1, this.filteredUsers.length) },
                sortBy(key) {
                    this.sortDir = this.sortKey === key && this.sortDir === 'asc' ? 'desc' : 'asc';
                    this.sortKey = key;
                },
                prevPage() { if (this.currentPage > 1) this.currentPage--; },
                nextPage() { if (this.currentPage < this.totalPages) this.currentPage++; },
                init() { this.$watch('filter', () => this.currentPage = 1) }
            }
        }
    </script>
</body>
</html>
