<!DOCTYPE html>
<html lang="en" vocab="https://gabrielcpule.github.io/mcss-vocab/api/mcss/v1.rdf">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 3.1: Advanced Tab Interface</title>
    <style>
        :root {
            --font-family-base: system-ui, sans-serif;
            --color-surface: #ffffff;
            --color-background: #f9fafb;
            --color-text-primary: #111827;
            --color-text-secondary: #6b7280;
            --color-border-default: #e5e7eb;
            --color-primary: #2563eb;
            --space-4: 1rem; --space-5: 1.25rem;
            --border-radius-lg: 0.5rem;
        }
        body { font-family: var(--font-family-base); background-color: var(--color-background); padding: var(--space-5); }
        .c-tabs { border: 1px solid var(--color-border-default); border-radius: var(--border-radius-lg); background-color: var(--color-surface); }
        .c-tabs__list { display: flex; list-style: none; margin: 0; padding: 0; border-bottom: 1px solid var(--color-border-default); }
        .c-tabs__trigger { padding: 0.75rem 1.25rem; border: none; background: none; cursor: pointer; font-size: 1rem; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .c-tabs__trigger[data-state="active"] { color: var(--color-primary); border-color: var(--color-primary); font-weight: 600; }
        .c-tabs__trigger:focus-visible { outline: 2px solid var(--color-primary); outline-offset: -2px; }
        .c-tabs__panel { padding: var(--space-5); }
        .c-tabs__panel[data-state="inactive"] { display: none; }
        .u-hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 
        Test 3.1: Advanced Tab Interface
        This is a complex organism requiring a detailed behavioral contract for accessibility.
    -->
    <div class="c-tabs"
         id="advanced-tabs"
         typeof="mcs:Component"
         property="mcs:taxonomyLevel" content="mcs:Organism"
         property="mcs:componentName" content="Advanced Tab Interface">

        <span property="mcs:purpose" content="Allows users to navigate between different sections of content in a single view, with full keyboard accessibility." class="u-hidden"></span>

        <!-- BEHAVIOR.MD Contract
        ========================================
        Component: c-tabs
        APG Pattern: https://www.w3.org/WAI/ARIA/apg/patterns/tabs/

        ## Keyboard Interactions
        | Key           | Context   | Action                                           |
        |---------------|-----------|--------------------------------------------------|
        | Tab           | Tab       | Moves focus into the active tab panel. If panel has no focusable elements, moves to next element after the tab list. |
        | Right Arrow   | Tab List  | Moves focus to the next tab, wrapping to the first. Activates tab automatically. |
        | Left Arrow    | Tab List  | Moves focus to the previous tab, wrapping to the last. Activates tab automatically. |
        | Home          | Tab List  | Moves focus to the first tab.                    |
        | End           | Tab List  | Moves focus to the last tab.                     |
        | Space / Enter | Tab       | (Optional) Activates the tab if not auto-activated. |

        ## ARIA State Management
        - Tab List: `role="tablist"`
        - Tab Trigger: `role="tab"`, `aria-selected`, `aria-controls`, `tabindex`
        - Tab Panel: `role="tabpanel"`, `aria-labelledby`
        -->

        <ul class="c-tabs__list" role="tablist" aria-label="Content Sections">
            <li role="presentation">
                <button class="c-tabs__trigger"
                        role="tab"
                        id="tab-1"
                        aria-controls="panel-1"
                        aria-selected="true"
                        tabindex="0"
                        data-state="active">
                    Profile
                </button>
            </li>
            <li role="presentation">
                <button class="c-tabs__trigger"
                        role="tab"
                        id="tab-2"
                        aria-controls="panel-2"
                        aria-selected="false"
                        tabindex="-1"
                        data-state="inactive">
                    Dashboard
                </button>
            </li>
            <li role="presentation">
                <button class="c-tabs__trigger"
                        role="tab"
                        id="tab-3"
                        aria-controls="panel-3"
                        aria-selected="false"
                        tabindex="-1"
                        data-state="inactive">
                    Settings
                </button>
            </li>
        </ul>

        <div id="panel-1"
             class="c-tabs__panel"
             role="tabpanel"
             aria-labelledby="tab-1"
             tabindex="0"
             data-state="active">
            <h3>Profile Information</h3>
            <p>This is the content for the user's profile.</p>
        </div>

        <div id="panel-2"
             class="c-tabs__panel"
             role="tabpanel"
             aria-labelledby="tab-2"
             tabindex="0"
             data-state="inactive">
            <h3>Dashboard Analytics</h3>
            <p>This is the content for the user's dashboard.</p>
        </div>

        <div id="panel-3"
             class="c-tabs__panel"
             role="tabpanel"
             aria-labelledby="tab-3"
             tabindex="0"
             data-state="inactive"
             hidden>
            <h3>Settings Configuration</h3>
            <p>This is the content for the user's settings.</p>
        </div>
    </div>

    <script>
        // Full WAI-ARIA compliant tabs script
        class Tabs {
            constructor(groupNode) {
                this.tablist = groupNode.querySelector('[role="tablist"]');
                this.tabs = Array.from(this.tablist.querySelectorAll('[role="tab"]'));
                this.panels = Array.from(groupNode.querySelectorAll('[role="tabpanel"]'));
                this.firstTab = this.tabs[0];
                this.lastTab = this.tabs[this.tabs.length - 1];

                this.tablist.addEventListener('keydown', this.onKeydown.bind(this));
                this.tabs.forEach(tab => tab.addEventListener('click', this.onClick.bind(this)));
            }

            onKeydown(event) {
                const currentTab = event.target;
                let newTab;

                switch (event.key) {
                    case 'ArrowLeft':
                        newTab = this.tabs.indexOf(currentTab) === 0 ? this.lastTab : this.tabs[this.tabs.indexOf(currentTab) - 1];
                        break;
                    case 'ArrowRight':
                        newTab = this.tabs.indexOf(currentTab) === this.tabs.length - 1 ? this.firstTab : this.tabs[this.tabs.indexOf(currentTab) + 1];
                        break;
                    case 'Home':
                        newTab = this.firstTab;
                        break;
                    case 'End':
                        newTab = this.lastTab;
                        break;
                    default:
                        return;
                }

                if (newTab) {
                    newTab.focus();
                    this.activateTab(newTab);
                    event.preventDefault();
                }
            }

            onClick(event) {
                this.activateTab(event.currentTarget);
            }

            activateTab(tab) {
                this.tabs.forEach(t => {
                    t.setAttribute('aria-selected', 'false');
                    t.setAttribute('tabindex', '-1');
                    t.dataset.state = 'inactive';
                });
                this.panels.forEach(p => { p.hidden = true; p.dataset.state = 'inactive'; });

                tab.setAttribute('aria-selected', 'true');
                tab.setAttribute('tabindex', '0');
                tab.dataset.state = 'active';

                const controlledPanel = document.getElementById(tab.getAttribute('aria-controls'));
                controlledPanel.hidden = false;
                controlledPanel.dataset.state = 'active';
            }
        }

        new Tabs(document.getElementById('advanced-tabs'));
    </script>

</body>
</html>
