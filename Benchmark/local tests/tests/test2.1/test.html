<!DOCTYPE html>
<html lang="en" vocab="https://gabrielcpule.github.io/mcss-vocab/api/mcss/v1.rdf">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 2.1: Modal Dialog with Form</title>
    <style>
        :root {
            --font-family-base: system-ui, sans-serif;
            --color-surface: #ffffff;
            --color-text-primary: #111827;
            --color-text-secondary: #6b7280;
            --color-border-default: #e5e7eb;
            --color-primary: #2563eb;
            --color-primary-text: #ffffff;
            --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
            --border-radius-md: 0.375rem; --border-radius-lg: 0.5rem;
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        body { font-family: var(--font-family-base); padding: var(--space-6); }
        .l-stack > * + * { margin-top: var(--space-4); }
        .c-modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .c-modal[data-state="closed"] { display: none; }
        .c-modal__backdrop { position: absolute; inset: 0; background-color: rgba(0,0,0,0.5); }
        .c-modal__container { position: relative; background-color: var(--color-surface); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-xl); padding: var(--space-6); width: 100%; max-width: 500px; }
        .c-modal__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); }
        .c-modal__title { font-size: 1.25rem; font-weight: 600; }
        .c-modal__close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .c-form-field { display: flex; flex-direction: column; }
        .c-form-field + .c-form-field { margin-top: var(--space-4); }
        .c-form-field__label { margin-bottom: var(--space-3); font-weight: 500; }
        .c-form-field__input { padding: 0.5rem 0.75rem; border: 1px solid var(--color-border-default); border-radius: var(--border-radius-md); }
        .c-button { display: inline-block; padding: 0.5rem 1rem; border-radius: var(--border-radius-md); background-color: var(--color-primary); color: var(--color-primary-text); text-decoration: none; font-weight: 500; border: none; cursor: pointer; }
        .c-button--secondary { background-color: #e5e7eb; color: #111827; }
        .u-hidden { display: none !important; }
        .u-flex-right { display: flex; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-5); }
    </style>
</head>
<body>

    <button class="c-button" data-mcs-interaction-type="state-change" data-mcs-target="#contact-modal" data-mcs-consequence="Opens the contact modal dialog.">
        Open Contact Modal
    </button>

    <!-- 
        Test 2.1: Modal Dialog with Form
        This is a complex organism that demonstrates composition and requires a behavioral contract.
    -->
    <div class="c-modal"
         id="contact-modal"
         typeof="mcs:Component"
         property="mcs:taxonomyLevel" content="mcs:Organism"
         property="mcs:componentName" content="Contact Modal"
         role="dialog"
         aria-modal="true"
         aria-labelledby="modal-title"
         data-state="closed">

        <span property="mcs:purpose" content="Provides a focused overlay to capture user contact information without leaving the current page." class="u-hidden"></span>

        <!-- Composition: This modal organism contains a contact form molecule. -->
        <div property="mcs:hasPart" resource="#contact-form-1"></div>

        <!-- BEHAVIOR.MD Contract (as comment)
        ========================================
        Component: c-modal
        APG Pattern: https://www.w3.org/WAI/ARIA/apg/patterns/dialog-modal/

        ## Keyboard Interactions
        | Key      | Context      | Action                                           |
        |----------|--------------|--------------------------------------------------|
        | Tab      | In Modal     | Moves focus to the next focusable element inside the modal. Traps focus. |
        | Shift+Tab| In Modal     | Moves focus to the previous focusable element. Traps focus. |
        | Escape   | Modal Open   | Closes the modal and returns focus to the trigger element. |

        ## Focus Management
        - Focus Entry: When opened, focus moves to the first focusable element (the close button).
        - Focus Trapping: Focus is contained within the modal.
        - Focus Restoration: On close, focus returns to the element that opened the modal.
        -->

        <div class="c-modal__backdrop" data-mcs-action="close-modal" data-mcs-target="#contact-modal"></div>

        <div class="c-modal__container">
            <header class="c-modal__header">
                <h2 id="modal-title" class="c-modal__title" property="mcs:part" content="Header">Contact Us</h2>
                <button class="c-modal__close-btn" aria-label="Close dialog" data-mcs-action="close-modal" data-mcs-target="#contact-modal">&times;</button>
            </header>

            <div class="c-modal__body" property="mcs:part" content="Body">

                <!-- Contact Form Molecule -->
                <form id="contact-form-1"
                      class="c-contact-form"
                      typeof="mcs:Component"
                      property="mcs:taxonomyLevel" content="mcs:Molecule">

                    <span property="mcs:purpose" content="A form for users to submit their name, email, and a message." class="u-hidden"></span>

                    <!-- Composition: This molecule has three form field parts. -->
                    <div property="mcs:hasPart" resource="#form-field-name"></div>
                    <div property="mcs:hasPart" resource="#form-field-email"></div>
                    <div property="mcs:hasPart" resource="#form-field-message"></div>

                    <div class="l-stack">
                        <!-- Form Field Atom -->
                        <div id="form-field-name" class="c-form-field" typeof="mcs:Component" property="mcs:taxonomyLevel" content="mcs:Atom">
                            <label for="name" class="c-form-field__label">Name</label>
                            <input type="text" id="name" class="c-form-field__input" required>
                        </div>

                        <!-- Form Field Atom -->
                        <div id="form-field-email" class="c-form-field" typeof="mcs:Component" property="mcs:taxonomyLevel" content="mcs:Atom">
                            <label for="email" class="c-form-field__label">Email</label>
                            <input type="email" id="email" class="c-form-field__input" required>
                        </div>

                        <!-- Form Field Atom -->
                        <div id="form-field-message" class="c-form-field" typeof="mcs:Component" property="mcs:taxonomyLevel" content="mcs:Atom">
                            <label for="message" class="c-form-field__label">Message</label>
                            <textarea id="message" class="c-form-field__input" rows="4" required></textarea>
                        </div>
                    </div>
                </form>
            </div>

            <footer class="c-modal__footer u-flex-right" property="mcs:part" content="Footer">
                <button class="c-button c-button--secondary" data-mcs-action="close-modal" data-mcs-target="#contact-modal">Cancel</button>
                <button type="submit" form="contact-form-1" class="c-button" data-mcs-interaction-type="submission" data-mcs-consequence="Submits the contact form and closes the modal.">Submit</button>
            </footer>
        </div>
    </div>

    <script>
        // Basic script to demonstrate modal open/close. A real implementation would be more robust.
        document.addEventListener('click', (e) => {
            const trigger = e.target.closest('[data-mcs-action="close-modal"], [data-mcs-interaction-type="state-change"]');
            if (!trigger) return;

            const targetId = trigger.dataset.mcsTarget;
            if (!targetId) return;

            const modal = document.querySelector(targetId);
            if (!modal) return;

            const currentState = modal.dataset.state;
            modal.dataset.state = currentState === 'closed' ? 'open' : 'closed';
        });
    </script>

</body>
</html>
